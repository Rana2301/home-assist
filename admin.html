<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Home Assist</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --uc-brand: #673ab7; 
      --uc-dark: #0f172a;
      --uc-text-muted: #64748b;
      --glass: rgba(255, 255, 255, 0.9);
      --card-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8fafc;
      margin: 0;
      display: flex;
      color: var(--uc-dark);
    }

    /* Sidebar Navigation */
    .sidebar {
      width: 260px;
      height: 100vh;
      background: var(--uc-dark);
      color: white;
      padding: 30px 20px;
      position: fixed;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 { font-weight: 800; margin-bottom: 40px; }
    .sidebar nav p { 
      padding: 12px; 
      border-radius: 10px; 
      cursor: pointer; 
      transition: 0.3s; 
      display: flex; 
      align-items: center; 
      gap: 10px;
    }
    .sidebar nav p:hover { background: rgba(255,255,255,0.1); }
    .active-nav { background: var(--uc-brand) !important; }

    /* Main Layout */
    .main-content {
      margin-left: 300px;
      padding: 40px;
      width: calc(100% - 300px);
    }

    header { margin-bottom: 40px; }

    /* Stats Section */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: var(--card-shadow);
      border-bottom: 4px solid var(--uc-brand);
    }

    .stat-card small { color: var(--uc-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .stat-card h2 { margin: 10px 0 0 0; font-size: 32px; }

    /* Table Section */
    .worker-section {
      background: white;
      padding: 35px;
      border-radius: 24px;
      box-shadow: var(--card-shadow);
    }

    .worker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 15px; border-bottom: 2px solid #f1f5f9; color: var(--uc-text-muted); font-size: 14px; }
    td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; font-size: 15px; }

    /* Buttons */
    .btn-add {
      background: var(--uc-brand);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(103, 58, 183, 0.3);
      transition: 0.3s;
    }
    .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(103, 58, 183, 0.4); }

    .btn-remove {
      background: #fee2e2;
      color: #ef4444;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-remove:hover { background: #ef4444; color: white; }

    .status-pill {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      background: #f0fdf4;
      color: #16a34a;
    }

    @media (max-width: 1024px) {
      .sidebar { width: 80px; padding: 20px 10px; }
      .sidebar h2, .sidebar nav p span { display: none; }
      .main-content { margin-left: 100px; width: calc(100% - 140px); }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <h2>Home<span style="color:var(--uc-brand)">Assist</span></h2>
    <nav>
      <p class="active-nav">📊 <span>Dashboard</span></p>
      <p>👷 <span>Workers</span></p>
      <p>📅 <span>Bookings</span></p>
      <p>⚙️ <span>Settings</span></p>
    </nav>
  </aside>

  <main class="main-content">
    <header>
      <h1 style="font-weight: 800; font-size: 32px; margin: 0;">Real-time Analytics</h1>
      <p style="color: var(--uc-text-muted); margin: 5px 0 0 0;">Managing services in <b>Bharuch</b></p>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <small>Total Workers</small>
        <h2 id="active-workers">0</h2>
      </div>
      <div class="stat-card">
        <small>Live Bookings</small>
        <h2>12</h2>
      </div>
      <div class="stat-card">
        <small>Revenue (Today)</small>
        <h2>₹4,500</h2>
      </div>
    </div>

    <section class="worker-section">
      <div class="worker-header">
        <h2 style="margin:0;">Worker Directory</h2>
        <button class="btn-add" id="addWorkerBtn">+ Add Worker</button>
      </div>
      
      <table>
        <thead>
          <tr>
            <th>WORKER NAME</th>
            <th>SERVICE CATEGORY</th>
            <th>STATUS</th>
            <th>ACTIONS</th>
          </tr>
        </thead>
        <tbody id="worker-table-body">
          </tbody>
      </table>
    </section>
  </main>

  <script type="module">
    import { auth, db } from "./firebase.js"; // Note: Added auth import
    import { 
      collection, 
      addDoc, 
      onSnapshot, 
      deleteDoc, 
      doc,
      serverTimestamp,
      query,
      where,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // --- SECURITY GUARD ---
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const q = query(collection(db, "users"), where("uid", "==", user.uid));
        const snap = await getDocs(q);
        let isAdmin = false;
        snap.forEach(d => { if(d.data().isAdmin === true) isAdmin = true; });

        if (!isAdmin) {
          alert("Unauthorized access!");
          window.location.href = "login.html";
        }
      } else {
        window.location.href = "login.html";
      }
    });

    const workerTableBody = document.getElementById('worker-table-body');
    const addBtn = document.getElementById('addWorkerBtn');

    onSnapshot(collection(db, "workers"), (snapshot) => {
      workerTableBody.innerHTML = ""; 
      let count = 0;

      snapshot.forEach((workerDoc) => {
        const worker = workerDoc.data();
        const row = document.createElement('tr');
        count++;

        row.innerHTML = `
          <td><b>${worker.name}</b></td>
          <td>${worker.service}</td>
          <td><span class="status-pill">Active</span></td>
          <td>
            <button class="btn-remove" data-id="${workerDoc.id}">Remove</button>
          </td>
        `;
        workerTableBody.appendChild(row);
      });

      document.getElementById('active-workers').innerText = count;
    });

    addBtn.addEventListener('click', async () => {
      const name = prompt("Worker Full Name:");
      const service = prompt("Service (e.g., Plumbing, Electrician):");
      
      if (name && service) {
        try {
          await addDoc(collection(db, "workers"), {
            name: name,
            service: service,
            joinedAt: serverTimestamp()
          });
        } catch (error) {
          alert("Error adding worker. Check console.");
          console.error(error);
        }
      }
    });

    workerTableBody.addEventListener('click', async (e) => {
      if (e.target.classList.contains('btn-remove')) {
        const id = e.target.getAttribute('data-id');
        if (confirm("Permanently remove this worker from the system?")) {
          try {
            await deleteDoc(doc(db, "workers", id));
          } catch (error) {
            console.error("Error deleting:", error);
          }
        }
      }
    });
  </script>
</body>
</html>
