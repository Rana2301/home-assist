<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png.png"> 
<title>Home Assist | Trusted Home Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    :root { --primary: #2563eb; }
    body { font-family: 'Poppins', sans-serif; background: #f8fafc; margin: 0; }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 10px 20px; border-bottom: 1px solid #e2e8f0; }
    .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
    .logo-text { font-size: 24px; font-weight: 700; color: var(--primary); text-decoration: none; }
    
    .contact-container { max-width: 1000px; margin: 50px auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; padding: 20px; }
    .contact-info { background: var(--primary); color: white; padding: 40px; border-radius: 20px; }
    .contact-form { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    
    input, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
    button { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .logo-container {
  display: flex;
  align-items: center;
  text-decoration: none;
  gap: 12px;
}

.logo-img {
  width: 40px; 
  height: 40px;
  object-fit: contain;
}

.logo-text { 
  font-size: 20px; 
  font-weight: 700; 
  color: var(--primary); 
}

@media (min-width: 768px) {
  .logo-text { font-size: 24px; }
}
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo-container">
      <img src="logo.png.png" alt="Home Assist Logo" class="logo-img">
      <span class="logo-text">Home Assist</span>
    </a>
      <nav style="display:flex; gap:20px;">
        <a href="index.html" style="text-decoration:none; color:#64748b;">Home</a>
        <a href="about.html" style="text-decoration:none; color:#64748b;">About</a>
      </nav>
    </div>
  </header>

  <div class="contact-container">
    <div class="contact-info">
      <h2>Get in Touch</h2>
      <p>Have questions? We're here to help.</p>
      <div style="margin-top:40px;">
        <p>📍 Bharuch, Gujarat</p>
        <p>📞 +91 9426312041</p>
        <p>✉️ prathamrana2612@gmail.com</p>
      </div>
    </div>

    <div class="contact-form">
      <h3>Send us a Message</h3>
      <form id="contact-form">
        <input type="text" name="user_name" id="user_name" placeholder="Your Name" required>
        <input type="email" name="user_email" id="user_email" placeholder="Email Address" required>
        <textarea name="message" id="message" rows="5" placeholder="How can we help?" required></textarea>
        <button type="submit" id="submit-btn">Send Message</button>
      </form>
    </div>
  </div>

  <script type="text/javascript">
    (function() {
        // Replace 'YOUR_PUBLIC_KEY' with the key from your EmailJS Account
        emailjs.init("vFHb8O3ZK17K5hQNK");
    })();

    document.getElementById('contact-form').addEventListener('submit', function(event) {
        event.preventDefault();
        
        const btn = document.getElementById('submit-btn');
        btn.innerText = 'Sending...';
        btn.disabled = true;

        // Replace 'YOUR_SERVICE_ID' and 'YOUR_TEMPLATE_ID' with your actual IDs
        emailjs.sendForm('service_ql0al03', 'template_v6a7xwc', this)
            .then(() => {
                alert('Success! Your message has been sent.');
                btn.innerText = 'Send Message';
                btn.disabled = false;
                document.getElementById('contact-form').reset();
            }, (error) => {
                alert('Failed to send message. Error: ' + JSON.stringify(error));
                btn.innerText = 'Send Message';
                btn.disabled = false;
            });
    });
  </script>
</body>
</html>
