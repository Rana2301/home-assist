<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.png.png"> 
  <title>Contact Us | Home Assist</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  
  <style>
    :root {
      --uc-brand: #673ab7; 
      --uc-dark: #0f172a;
      --uc-text-muted: #64748b;
      --glass: rgba(255, 255, 255, 0.8);
      --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #fcfcfd;
      color: var(--uc-dark);
      margin: 0;
      overflow-x: hidden;
    }

    /* Floating Navigation (Matches Index) */
    .navbar {
      background: var(--glass);
      backdrop-filter: blur(12px);
      position: fixed;
      width: 90%;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 20px;
      z-index: 2000;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: var(--card-shadow);
      padding: 12px 30px;
      transition: var(--transition);
    }

    .nav-container { display: flex; justify-content: space-between; align-items: center; }
    
    .brand-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo { height: 35px; width: auto; }
    .brand-text { font-weight: 800; font-size: 22px; color: var(--uc-dark); }
    .assist-highlight { color: var(--uc-brand); }

    /* Hero Section */
    .contact-hero {
      padding: 180px 20px 60px;
      background: radial-gradient(circle at top right, #f5f3ff, #ffffff);
      text-align: center;
    }

    /* Unique Split Layout */
    .contact-wrapper {
      max-width: 1100px;
      margin: 0 auto 100px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 30px;
    }

    .info-panel {
      background: var(--uc-dark);
      color: white;
      padding: 50px;
      border-radius: 30px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .info-panel::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      background: var(--uc-brand);
      filter: blur(80px);
      opacity: 0.4;
    }

    .form-panel {
      background: white;
      padding: 50px;
      border-radius: 30px;
      box-shadow: var(--card-shadow);
      border: 1px solid #f1f5f9;
    }

    /* Form Elements */
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: var(--uc-text-muted); }
    
    input, textarea {
      width: 100%;
      padding: 15px 20px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 15px;
      font-family: inherit;
      transition: var(--transition);
      box-sizing: border-box;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--uc-brand);
      background: white;
      box-shadow: 0 0 0 4px rgba(103, 58, 183, 0.1);
    }

    .submit-btn {
      background: var(--uc-brand);
      color: white;
      border: none;
      padding: 18px;
      border-radius: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: var(--transition);
      box-shadow: 0 10px 20px rgba(103, 58, 183, 0.2);
    }

    .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(103, 58, 183, 0.3); }
    .submit-btn:disabled { background: #94a3b8; transform: none; }

    .contact-item { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
    .icon-box { background: rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

    @media (max-width: 900px) {
      .contact-wrapper { grid-template-columns: 1fr; }
      .navbar { width: 95%; padding: 10px 20px; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="brand-wrap">
        <img src="logo.png.png" alt="Home Assist Logo" class="nav-logo">
        <span class="brand-text">Home<span class="assist-highlight">Assist</span>.</span>
      </a>
      <nav style="display:flex; gap:25px; align-items:center;">
        <a href="index.html" style="text-decoration:none; color:var(--uc-text-muted); font-weight:600; font-size:14px;">Home</a>
        <a href="about.html" style="text-decoration:none; color:var(--uc-text-muted); font-weight:600; font-size:14px;">About</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="contact-hero">
      <h1 style="font-weight: 800; font-size: clamp(2rem, 5vw, 3rem); margin: 0;">Let's <span class="assist-highlight">Talk.</span></h1>
      <p style="color: var(--uc-text-muted); margin-top: 10px;">We're here to help you make your home better.</p>
    </section>

    <div class="contact-wrapper">
      <div class="info-panel">
        <div>
          <h2 style="font-size: 28px; margin-bottom: 20px;">Contact Information</h2>
          <p style="color: #94a3b8; line-height: 1.6; margin-bottom: 40px;">Fill out the form and our team will get back to you within 24 hours.</p>
          
          <div class="contact-item">
            <div class="icon-box">📞</div>
            <div>
              <div style="font-size: 12px; color: #94a3b8;">Phone</div>
              <div style="font-weight: 600;">+91 9426312041</div>
            </div>
          </div>

          <div class="contact-item">
            <div class="icon-box">✉️</div>
            <div>
              <div style="font-size: 12px; color: #94a3b8;">Email</div>
              <div style="font-weight: 600;">prathamrana2612@gmail.com</div>
            </div>
          </div>

          <div class="contact-item">
            <div class="icon-box">📍</div>
            <div>
              <div style="font-size: 12px; color: #94a3b8;">Location</div>
              <div style="font-weight: 600;">Bharuch, Gujarat</div>
            </div>
          </div>
        </div>

        <div style="font-size: 14px; color: #94a3b8; border-top: 1px solid rgba(255,255,255,0.1); pt: 20px; margin-top: 20px;">
          Available: 8:00 AM - 10:00 PM
        </div>
      </div>

      <div class="form-panel">
        <form id="contact-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="user_name" id="user_name" placeholder="John Doe" required>
          </div>
          
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="user_email" id="user_email" placeholder="john@example.com" required>
          </div>
          
          <div class="form-group">
            <label>Message</label>
            <textarea name="message" id="message" rows="5" placeholder="Tell us how we can help..." required></textarea>
          </div>
          
          <button type="submit" id="submit-btn" class="submit-btn">Send Message</button>
        </form>
      </div>
    </div>
  </main>

  <script type="text/javascript">
    (function() {
        emailjs.init("vFHb8O3ZK17K5hQNK");
    })();

    window.onscroll = () => {
      const nav = document.querySelector('.navbar');
      if (window.scrollY > 50) {
        nav.style.width = '100%';
        nav.style.top = '0';
        nav.style.borderRadius = '0';
      } else {
        nav.style.width = '90%';
        nav.style.top = '20px';
        nav.style.borderRadius = '20px';
      }
    };

    document.getElementById('contact-form').addEventListener('submit', function(event) {
        event.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = 'Sending...';
        btn.disabled = true;

        emailjs.sendForm('service_ql0al03', 'template_v6a7xwc', this)
            .then(() => {
                alert('Success! Your message has been sent.');
                btn.innerText = 'Send Message';
                btn.disabled = false;
                document.getElementById('contact-form').reset();
            }, (error) => {
                alert('Failed to send. Error: ' + JSON.stringify(error));
                btn.innerText = 'Send Message';
                btn.disabled = false;
            });
    });
  </script>
</body>
</html>
