<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Home Assist</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2563eb; }
    body { font-family: 'Poppins', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .auth-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
    h2 { color: var(--primary); text-align: center; margin-bottom: 10px; }
    p { font-size: 13px; color: #64748b; text-align: center; margin-bottom: 20px; line-height: 1.5; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
    button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .hidden { display: none; }
    .link-text { display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>

  <div class="auth-card">
    <h2>Reset Password</h2>
    
    <div id="step-1">
      <p>Enter your <b>Email</b> for a reset link or <b>Mobile Number</b> for an OTP.</p>
      <input type="text" id="user-id-input" placeholder="Email or Mobile (+91...)">
      <button id="send-btn">Send Reset Info</button>
    </div>

    <div id="step-otp" class="hidden">
      <p>Enter the 4-digit OTP sent to your phone.</p>
      <input type="text" id="otp-input" placeholder="Enter 4-Digit OTP" maxlength="4">
      <button id="verify-btn">Verify OTP</button>
    </div>

    <div id="step-new-pass" class="hidden">
      <p>Create a new password for your account.</p>
      <input type="password" id="new-pass" placeholder="New Password (min. 6 chars)">
      <button id="update-btn">Update Password</button>
    </div>

    <a href="login.html" class="link-text">Back to Login</a>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { collection, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let tempOTP = "";
    let targetDocId = ""; 

    // --- SEND LOGIC ---
    document.getElementById('send-btn').onclick = async () => {
        const input = document.getElementById('user-id-input').value.trim();
        const btn = document.getElementById('send-btn');
        
        if (!input) return alert("Please enter your registered email or phone.");

        try {
            btn.disabled = true;
            btn.innerText = "Checking...";

            if (input.includes('@')) {
                // EMAIL PATH
                await sendPasswordResetEmail(auth, input);
                alert("Success! Check your email for the reset link.");
                window.location.href = "login.html";
            } else {
                // MOBILE PATH (Fast2SMS Integration)
                const q = query(collection(db, "users"), where("mobile", "==", input));
                const snap = await getDocs(q);

                if (snap.empty) {
                    throw new Error("This mobile number is not registered.");
                }

                snap.forEach(d => { targetDocId = d.id; });
                
                // Generate 4-digit OTP
                tempOTP = Math.floor(1000 + Math.random() * 9000).toString();

                // Fast2SMS API Call
                const apiKey = "wMPi7ayWTtnckACHoBGY1r8qgSdsJKvlzU6hQN3Fj5Ef9RXDeZXgGFxm63ESebRWBP4t5Q2hAruyfovI";
                const response = await fetch(`https://www.fast2sms.com/dev/bulkV2?authorization=${apiKey}&route=otp&variables_values=${tempOTP}&numbers=${input}`);
                const data = await response.json();

                if (data.return) {
                    alert("OTP sent successfully to your mobile!");
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-otp').classList.remove('hidden');
                } else {
                    throw new Error("Failed to send SMS. Please check your Fast2SMS API balance or settings.");
                }
            }
        } catch (e) {
            alert("Error: " + e.message);
            btn.disabled = false;
            btn.innerText = "Send Reset Info";
        }
    };

    // --- VERIFY OTP LOGIC ---
    document.getElementById('verify-btn').onclick = () => {
        const entered = document.getElementById('otp-input').value;
        if (entered === tempOTP && tempOTP !== "") {
            document.getElementById('step-otp').classList.add('hidden');
            document.getElementById('step-new-pass').classList.remove('hidden');
        } else {
            alert("Incorrect OTP. Please try again.");
        }
    };

    // --- UPDATE PASSWORD LOGIC ---
    document.getElementById('update-btn').onclick = async () => {
        const newPass = document.getElementById('new-pass').value;
        const btn = document.getElementById('update-btn');

        if (newPass.length < 6) return alert("Password must be at least 6 characters.");
        if (!targetDocId) return alert("Session expired. Please start again.");

        try {
            btn.disabled = true;
            btn.innerText = "Updating...";
            
            const userRef = doc(db, "users", targetDocId);
            await updateDoc(userRef, { password: newPass });
            
            alert("Password updated successfully! You can now login.");
            window.location.href = "login.html";
        } catch (e) {
            alert("Update failed: " + e.message);
            btn.disabled = false;
            btn.innerText = "Update Password";
        }
    };
  </script>

</body>
</html>
