<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password | Home Assist</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2563eb; }
    body { font-family: 'Poppins', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .auth-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
    h2 { color: var(--primary); text-align: center; margin-bottom: 10px; }
    p { font-size: 13px; color: #64748b; text-align: center; margin-bottom: 20px; line-height: 1.5; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
    button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    button:disabled { background: #94a3b8; }
    .link-text { display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h2>Reset Password</h2>
    <p>Enter your <b>Email</b> or <b>Registered Mobile Number</b> to receive a reset link.</p>
    
    <input type="text" id="user-identifier" placeholder="Email or Mobile (+91...)" required>
    
    <button id="reset-btn">Send Reset Link</button>
    <a href="login.html" class="link-text">Back to Login</a>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    document.getElementById('reset-btn').addEventListener('click', async () => {
        const input = document.getElementById('user-identifier').value.trim();
        const btn = document.getElementById('reset-btn');

        if (!input) {
            alert("Please enter your email or mobile number.");
            return;
        }

        try {
            btn.innerText = "Verifying...";
            btn.disabled = true;

            let targetEmail = input;

}

            // Now send the actual reset email to the identified account
            await sendPasswordResetEmail(auth, targetEmail);
            
            alert("Success! A reset link has been sent to the email associated with this account: " + targetEmail);
            window.location.href = "login.html";

        } catch (error) {
            btn.innerText = "Send Reset Link";
            btn.disabled = false;
            
            if (error.code === 'auth/user-not-found' || error.message.includes("not registered")) {
                alert("Account not found. Please check your details.");
            } else {
                alert("Error: " + error.message);
            }
        }
    });
  </script>
</body>
</html>
