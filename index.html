<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Assist | Luxury Home Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    /* [Insert Global CSS from Section 1 here] */
:root {
  --uc-brand: #673ab7; /* Urban Company Signature Purple */
  --uc-dark: #0f172a;
  --uc-text-muted: #64748b;
  --glass: rgba(255, 255, 255, 0.8);
  --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
  --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'Poppins', sans-serif;
  background-color: #fcfcfd;
  color: var(--uc-dark);
  margin: 0;
  overflow-x: hidden;
}

/* New Animation Keyframes */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(50px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes pulse-soft {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

.animate-fade-up { animation: fadeInUp 0.8s ease-out forwards; }
    /* Floating Navigation */
    .navbar {
      background: var(--glass);
      backdrop-filter: blur(12px);
      position: fixed;
      width: 90%;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 20px;
      z-index: 2000;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: var(--card-shadow);
      padding: 12px 30px;
    }

    /* Hero with Dynamic Search */
    .hero-container {
      padding: 160px 20px 80px;
      background: radial-gradient(circle at top right, #f5f3ff, #ffffff);
      text-align: center;
    }

    .hero-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 15px;
      color: var(--uc-dark);
    }

    .search-pill {
      background: white;
      max-width: 800px;
      margin: 40px auto;
      padding: 8px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
      border: 1px solid #f1f5f9;
      transition: var(--transition);
    }

    .search-pill:focus-within {
      transform: scale(1.02);
      box-shadow: 0 15px 50px rgba(103, 58, 183, 0.1);
    }

    /* Interactive Service Cards */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 25px;
      max-width: 1100px;
      margin: -40px auto 60px;
      padding: 0 20px;
    }

    .service-card {
      background: white;
      padding: 30px 20px;
      border-radius: 24px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid #f8fafc;
      box-shadow: var(--card-shadow);
    }

    .service-card:hover {
      background: var(--uc-brand);
      transform: translateY(-12px);
    }

    .service-card:hover h3, .service-card:hover p { color: white; }
    .service-card .icon-wrap {
      font-size: 40px;
      margin-bottom: 15px;
      transition: var(--transition);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: var(--uc-brand); border-radius: 10px; }
  </style>
</head>
<body>

  <header class="navbar">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <a href="index.html" style="text-decoration:none; font-size:22px; font-weight:800; color:var(--uc-brand);">
        HomeAssist<span style="color:var(--uc-dark);">.</span>
      </a>
      <nav style="display:flex; gap:30px; align-items:center;">
        <a href="about.html" style="text-decoration:none; color:var(--uc-text-muted); font-weight:600; font-size:14px;">About</a>
        <a href="contact.html" style="text-decoration:none; color:var(--uc-text-muted); font-weight:600; font-size:14px;">Support</a>
        <a href="login.html" style="background:var(--uc-brand); color:white; padding:10px 25px; border-radius:12px; text-decoration:none; font-weight:600; font-size:14px; box-shadow: 0 4px 15px rgba(103, 58, 183, 0.3);">Get Started</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-container">
      <div class="animate-fade-up">
        <h1 class="hero-title">Expert help for <br><span id="dynamic-text" style="color:var(--uc-brand);">every home need.</span></h1>
        <p style="color:var(--uc-text-muted); font-size:18px;">Quality services delivered to your doorstep in Bharuch.</p>
        
        <div class="search-pill">
          <input type="text" placeholder="What are you looking for?" style="flex:1; border:none; padding:15px 25px; outline:none; font-size:16px; background:transparent;">
          <button style="background:var(--uc-brand); color:white; border:none; padding:12px 35px; border-radius:40px; font-weight:600; cursor:pointer;">Find Expert</button>
        </div>
      </div>
    </section>

    <section class="service-grid">
      <div class="service-card" style="animation-delay: 0.1s;">
        <div class="icon-wrap">🚰</div>
        <h3 style="margin:10px 0;">Plumbing</h3>
        <p style="font-size:12px; color:var(--uc-text-muted);">Starting at ₹149.</p>
      </div>

      <div class="service-card" style="animation-delay: 0.2s;">
        <div class="icon-wrap">⚡</div>
        <h3 style="margin:10px 0;">Electrical</h3>
        <p style="font-size:12px; color:var(--uc-text-muted);">Wiring & Repairs.</p>
      </div>

      <div class="service-card" style="animation-delay: 0.3s;">
        <div class="icon-wrap">❄️</div>
        <h3 style="margin:10px 0;">AC Repair</h3>
        <p style="font-size:12px; color:var(--uc-text-muted);">Gas refilling & Cleaning.</p>
      </div>

      <div class="service-card" style="animation-delay: 0.4s;">
        <div class="icon-wrap">🧹</div>
        <h3 style="margin:10px 0;">Cleaning</h3>
        <p style="font-size:12px; color:var(--uc-text-muted);">Deep home sanitation.</p>
      </div>
    </section>
  </main>

  <script>
    // Dynamic text cycler
    const phrases = ["every home need.", "busy weekends.", "broken pipes.", "sparking wires."];
    let i = 0;
    const textEl = document.getElementById('dynamic-text');
    
    setInterval(() => {
      textEl.style.opacity = 0;
      setTimeout(() => {
        textEl.innerText = phrases[i];
        textEl.style.opacity = 1;
        i = (i + 1) % phrases.length;
      }, 400);
    }, 3000);

    // Scroll effect for Navbar
    window.onscroll = () => {
      const nav = document.querySelector('.navbar');
      if (window.scrollY > 50) {
        nav.style.width = '100%';
        nav.style.top = '0';
        nav.style.borderRadius = '0';
      } else {
        nav.style.width = '90%';
        nav.style.top = '20px';
        nav.style.borderRadius = '20px';
      }
    };
  </script>
</body>
</html>
