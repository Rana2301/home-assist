<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Assist | Luxury Home Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --uc-brand: #673ab7; 
      --uc-dark: #0f172a;
      --uc-text-muted: #64748b;
      --glass: rgba(255, 255, 255, 0.9);
      --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #fcfcfd;
      margin: 0;
    }

    /* Navbar */
    .navbar {
      background: var(--glass);
      backdrop-filter: blur(12px);
      position: fixed;
      width: 90%;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 20px;
      z-index: 2000;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: var(--card-shadow);
      padding: 10px 30px;
      transition: var(--transition);
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-logo {
      height: 35px;
      width: auto;
    }

    /* THE MULTI-COLOR LOGIC */
    .brand-text {
      font-size: 24px;
      font-weight: 800;
      color: var(--uc-brand); /* Color for 'Home' */
      letter-spacing: -0.5px;
    }

    .assist-multi-color {
      /* This creates the gradient effect */
      background: linear-gradient(90deg, #673ab7, #008996, #002b5c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
    }

    /* Hero Section */
    .hero-container {
      padding: 180px 20px 80px;
      background: radial-gradient(circle at top right, #f5f3ff, #ffffff);
      text-align: center;
    }

    .tagline-hindi {
      display: block;
      font-size: 1.1rem;
      color: var(--uc-brand);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .hero-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      color: var(--uc-dark);
    }

    /* Service Grid */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 25px;
      max-width: 1100px;
      margin: -40px auto 60px;
      padding: 0 20px;
    }

    .service-card {
      background: white;
      padding: 30px 20px;
      border-radius: 24px;
      text-align: center;
      box-shadow: var(--card-shadow);
      transition: var(--transition);
    }

    .service-card:hover {
      background: var(--uc-brand);
      color: white;
      transform: translateY(-10px);
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <a href="index.html" class="brand-wrap">
        <img src="logo.ing.ing" alt="Logo" class="nav-logo">
        <span class="brand-text">
          Home<span class="assist-multi-color">Assist</span><span style="color:var(--uc-dark);">.</span>
        </span>
      </a>

      <nav style="display:flex; gap:25px; align-items:center;">
        <a href="#" style="text-decoration:none; color:var(--uc-text-muted); font-weight:600; font-size:14px;">About</a>
        <a href="#" style="text-decoration:none; color:var(--uc-text-muted); font-weight:600; font-size:14px;">Support</a>
        <a href="#" style="background:var(--uc-brand); color:white; padding:10px 22px; border-radius:12px; text-decoration:none; font-weight:600; font-size:14px;">Get Started</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-container">
      <span class="tagline-hindi">घर की हर ज़रूरत, अब एक ही जगह</span>
      <h1 class="hero-title">Expert help for <br><span style="color:var(--uc-brand);">every home need.</span></h1>
    </section>

    <section class="service-grid">
      <div class="service-card"><h3>Plumbing</h3><p>Starting at ₹149</p></div>
      <div class="service-card"><h3>Electrical</h3><p>Fast repairs</p></div>
      <div class="service-card"><h3>AC Service</h3><p>Cooling experts</p></div>
      <div class="service-card"><h3>Cleaning</h3><p>Deep sanitation</p></div>
    </section>
  </main>

  <script>
    window.onscroll = () => {
      const nav = document.querySelector('.navbar');
      if (window.scrollY > 50) {
        nav.style.width = '100%';
        nav.style.top = '0';
        nav.style.borderRadius = '0';
      } else {
        nav.style.width = '90%';
        nav.style.top = '20px';
        nav.style.borderRadius = '20px';
      }
    };
  </script>
</body>
</html>
