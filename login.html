<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Home Assist</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2563eb; }
    body { font-family: 'Poppins', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .auth-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
    h2 { color: var(--primary); text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .link-text { display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #64748b; cursor: pointer; text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="Email or Mobile Number">
    <input type="password" id="login-pass" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <a href="forgot.html" class="link-text">Forgot Password?</a>
    <a href="signup.html" class="link-text">Don't have an account? Sign Up</a>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
