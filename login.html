<!DOCTYPE html>
<html>
<head>
  <title>Login - Home Assist</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f4; }
    .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; border: none; border-radius: 5px; background: #2563eb; color: white; }
    button.secondary { background: #64748b; }
    hr { margin: 20px 0; border: 0; border-top: 1px solid #eee; }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login / Signup</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button class="secondary" onclick="signup()">Sign Up</button>
  <button style="background:none; color:#2563eb; text-decoration:underline;" onclick="forgotPassword()">Forgot Password?</button>

  <hr>
  <h3>Phone Login</h3>
  <input type="text" id="phone" placeholder="+919876543210">
  <div id="recaptcha-container"></div>
  <button onclick="sendOTP()">Send OTP</button>

  <input type="text" id="otp" placeholder="Enter 6-digit OTP">
  <button onclick="verifyOTP()">Verify OTP</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
