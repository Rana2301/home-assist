<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Payment | Home Assist</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7fe; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .payment-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .service-info { background: #eff6ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        h2 { color: #2563eb; margin-top: 0; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn-pay { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-pay:disabled { background: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="payment-card">
        <h2>Complete Payment</h2>
        <div class="service-info">
            <p id="pay-for">Service: Loading...</p>
            <p><strong>Total Amount: <span id="pay-amount">₹0</span></strong></p>
        </div>
        
        <input type="text" id="card-name" placeholder="Cardholder Name" required>
        <input type="text" id="card-number" placeholder="1234 5678 9101 1121" maxlength="19">
        <div style="display:flex; gap:10px;">
            <input type="text" placeholder="MM/YY" maxlength="5">
            <input type="password" placeholder="CVV" maxlength="3">
        </div>
        
        <button class="btn-pay" id="pay-button" onclick="processPayment()">Confirm & Pay</button>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Read data from the URL passed by services.html
        const params = new URLSearchParams(window.location.search);
        const service = params.get('service') || "General Service";
        const price = params.get('price') || "199";

        document.getElementById('pay-for').innerText = "Service: " + service;
        document.getElementById('pay-amount').innerText = "₹" + price;

        window.processPayment = async function() {
            const user = auth.currentUser;
            const payBtn = document.getElementById('pay-button');

            if (!user) {
                alert("Please login again.");
                window.location.href = "login.html";
                return;
            }

            try {
                payBtn.disabled = true;
                payBtn.innerText = "Processing...";

                // Save to Firestore
                await addDoc(collection(db, "bookings"), {
                    userId: user.uid,
                    userName: user.displayName || "Customer",
                    serviceType: service,
                    amount: price,
                    status: "paid",
                    time: Date.now()
                });

                alert("Payment Successful! Booking confirmed.");
                window.location.href = "index.html"; 
            } catch (error) {
                alert("Error: " + error.message);
                payBtn.disabled = false;
                payBtn.innerText = "Confirm & Pay";
            }
        };
    </script>
</body>
</html>
