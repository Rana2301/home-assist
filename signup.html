<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Home Assist</title>
  <link rel="icon" type="image/png" href="favicon.png.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2563eb; }
    
    body { 
      font-family: 'Poppins', sans-serif; 
      background: #f8fafc; 
      margin: 0; 
      display: flex; 
      flex-direction: column; 
      min-height: 100vh; 
    }

    /* Header Branding - Title and Logo Only */
    .header {
      padding: 15px 30px;
      background: white;
      display: flex;
      align-items: center;
      border-bottom: 4px solid var(--primary);
    }

    .logo-container {
      display: flex;
      align-items: center;
      text-decoration: none;
      gap: 12px;
    }

    .logo-img {
      width: 45px;
      height: 45px;
      object-fit: contain;
    }

    .logo-text { 
      font-size: 32px; 
      font-weight: 700; 
      color: var(--primary); 
    }

    /* Centering the Auth Card */
    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-card { 
      background: white; 
      padding: 30px; 
      border-radius: 15px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
      width: 100%; 
      max-width: 400px; 
    }

    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; transition: 0.3s; }
    button:hover { opacity: 0.9; }

    .password-container { position: relative; width: 100%; }
    .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #64748b; font-size: 18px; }
    .link-text { display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #64748b; text-decoration: none; }
  </style>
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo-container">
      <img src="logo.png.png" alt="Home Assist Logo" class="logo-img">
      <span class="logo-text">Home Assist</span>
    </a>
  </header>

  <div class="main-content">
    <div class="auth-card">
      <h2 style="color:var(--primary); text-align:center; margin-bottom:20px;">Create Account</h2>
      <input type="text" id="full-name" placeholder="Full Name">
      <input type="email" id="sign-email" placeholder="Email Address">
      <input type="text" id="mobile" placeholder="Mobile Number (+91...)">
      
      <div class="password-container">
        <input type="password" id="sign-pass" placeholder="Password">
        <span class="toggle-password" onclick="togglePassword('sign-pass')">👁️</span>
      </div>

      <div class="password-container">
        <input type="password" id="confirm-pass" placeholder="Confirm Password">
        <span class="toggle-password" onclick="togglePassword('confirm-pass')">👁️</span>
      </div>

      <button onclick="handleSignup()">Sign Up</button>
      <a href="login.html" class="link-text">Back to Login</a>
    </div>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
