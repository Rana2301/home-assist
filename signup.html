<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Home Assist</title>
  <style>
    /* Use same styles as login.html */
    :root { --primary: #2563eb; }
    body { font-family: 'Poppins', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .auth-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h2 style="color:var(--primary); text-align:center;">Create Account</h2>
    <input type="text" id="full-name" placeholder="Full Name">
    <input type="email" id="sign-email" placeholder="Email Address">
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="password" id="sign-pass" placeholder="Password (A-a-!-123)">
    <input type="password" id="confirm-pass" placeholder="Confirm Password">
    <button onclick="handleSignup()">Sign Up</button>
    <a href="login.html" style="display:block; text-align:center; margin-top:10px;">Back to Login</a>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
