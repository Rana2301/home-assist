<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Home Assist</title>
  <link rel="icon" type="image/png" href="favicon.png.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { 
      --primary: #2563eb; 
      --primary-dark: #1d4ed8;
      --glass: rgba(255, 255, 255, 0.85);
      --text-main: #1e293b;
      --text-muted: #64748b;
    }
    
    * { box-sizing: border-box; }

    body { 
      font-family: 'Poppins', sans-serif; 
      background: linear-gradient(-45deg, #e0e7ff, #f8fafc, #dbeafe, #f1f5f9);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      margin: 0; 
      display: flex; 
      flex-direction: column; 
      min-height: 100vh; 
      color: var(--text-main);
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Header Styling */
    .header {
      padding: 1rem 5%;
      background: var(--glass);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.05);
    }

    .logo-container {
      display: flex;
      align-items: center;
      text-decoration: none;
      gap: 12px;
    }

    .logo-img { width: 40px; height: 40px; object-fit: contain; }
    .logo-text { font-size: 24px; font-weight: 700; color: var(--primary); }

    /* Layout Wrapper */
    .page-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Glassmorphism Card */
    .auth-card { 
      background: var(--glass); 
      backdrop-filter: blur(12px);
      padding: 40px; 
      border-radius: 24px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
      width: 100%; 
      max-width: 480px; 
      border: 1px solid rgba(255,255,255,0.3);
    }

    .auth-card h2 {
      margin-top: 0;
      font-weight: 700;
      color: var(--text-main);
      text-align: center;
      font-size: 1.8rem;
    }

    .input-group { margin-bottom: 15px; position: relative; }
    
    input { 
      width: 100%; 
      padding: 14px 16px; 
      border: 1.5px solid #e2e8f0; 
      border-radius: 12px; 
      font-size: 15px; 
      background: white;
      transition: all 0.3s ease;
      outline: none;
    }

    input:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); 
    }

    .password-container { position: relative; }
    .toggle-password { 
      position: absolute; 
      right: 16px; 
      top: 50%; 
      transform: translateY(-50%); 
      cursor: pointer; 
      color: var(--text-muted);
      transition: 0.2s;
    }
    .toggle-password:hover { color: var(--primary); }

    button { 
      width: 100%; 
      padding: 14px; 
      background: var(--primary); 
      color: white; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 16px;
      margin-top: 20px; 
      transition: transform 0.2s, background 0.3s;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    button:hover { 
      background: var(--primary-dark); 
      transform: translateY(-2px);
    }

    .link-text { 
      display: block; 
      text-align: center; 
      margin-top: 20px; 
      font-size: 14px; 
      color: var(--text-muted); 
      text-decoration: none; 
    }
    .link-text span { color: var(--primary); font-weight: 600; }

    /* Footer Enhancement */
    footer {
      background: white;
      padding: 30px 5%;
      border-top: 1px solid #edf2f7;
      text-align: center;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
    }

    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: 0.2s;
    }

    .footer-links a:hover { color: var(--primary); }

    .copyright { font-size: 13px; color: #94a3b8; }

    @media (max-width: 480px) {
      .auth-card { 
        padding: 25px; 
        border-radius: 15px; 
        background: white; 
        box-shadow: none;
      }
      .header { padding: 10px 20px; }
      .logo-text { font-size: 20px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo-container">
      <img src="logo.png.png" alt="Home Assist Logo" class="logo-img">
      <span class="logo-text">Home Assist</span>
    </a>
    <div class="nav-right">
        <a href="login.html" style="text-decoration:none; font-size:14px; color:var(--primary); font-weight:600;">Sign In</a>
    </div>
  </header>

  <div class="page-wrapper">
    <div class="auth-card">
      <h2>Create Your Account</h2>
      <p style="text-align:center; color:var(--text-muted); margin-top:-10px; margin-bottom:25px; font-size:14px;">Join thousands getting expert help at home.</p>
      
      <div class="input-group">
        <input type="text" id="full-name" placeholder="Full Name">
      </div>
      
      <div class="input-group">
        <input type="email" id="sign-email" placeholder="Email Address">
      </div>

      <div class="input-group">
        <input type="text" id="mobile" placeholder="Mobile Number (+91...)">
      </div>
      
      <div class="input-group password-container">
        <input type="password" id="sign-pass" placeholder="Create Password">
        <i class="fas fa-eye toggle-password" onclick="togglePassword('sign-pass')"></i>
      </div>

      <div class="input-group password-container">
        <input type="password" id="confirm-pass" placeholder="Confirm Password">
        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm-pass')"></i>
      </div>

      <button onclick="handleSignup()">Get Started</button>
      
      <a href="login.html" class="link-text">Already have an account? <span>Login</span></a>
    </div>
  </div>

  <footer>
    <div class="footer-links">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">Support</a>
    </div>
    <div class="copyright">© 2026 Home Assist. All rights reserved.</div>
  </footer>

  <script type="module" src="app.js"></script>
  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      const icon = input.nextElementSibling;
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>
</body>
</html>
